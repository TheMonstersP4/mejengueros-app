name: Workflow Safety

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/scripts/**
      - app-backend/api/package.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/scripts/**
      - app-backend/api/package.json

permissions:
  contents: read

jobs:
  workflow-safety:
    name: Workflow safety guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check workflow safety invariants
        run: bash .github/scripts/check-workflow-safety.sh
