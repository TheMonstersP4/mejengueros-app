name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/backend-ci.yml
      - app-backend/api/**
  pull_request:

permissions:
  contents: read

jobs:
  backend-quality-gate:
    name: Backend API quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mejengueros_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mejengueros_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: app-backend/api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app-backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mejengueros_ci
        run: npx prisma migrate deploy

      - name: Migration contract tests
        env:
          PRISMA_MIGRATION_CONTRACT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mejengueros_ci
        run: npx jest --config ./jest.integration.config.cjs test/integration/prisma-relational-schema.contract.spec.ts --runInBand

      - name: Build
        run: npm run build
