name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/backend-ci.yml
      - app-backend/api/**
  pull_request:
    paths:
      - .github/workflows/backend-ci.yml
      - app-backend/api/**

permissions:
  contents: read

jobs:
  backend-quality-gate:
    name: Backend API quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app-backend/api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app-backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --runInBand --forceExit

      - name: Build
        run: npm run build
