<!DOCTYPE html>
<!--
  FLUJO: Dueño — Código de reseñas · ESTADO NO DISPONIBLE
  Issue: #46. Si la cancha no está publicada o no está activa, el código no
  habilita nuevas reseñas. Se comunica claro y se ofrece publicar la cancha.
  Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código no disponible · Cancha La Sabana</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); border-bottom: var(--apple-hairline); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; background: none; border: none; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__title { flex: 1; padding-left: 4px; }
  .appbar__title b { display: block; font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: var(--md-on-surface); }
  .appbar__title span { font-size: 12px; color: var(--md-on-surface-variant); letter-spacing: -.12px; }

  .scroll { flex: 1; overflow-y: auto; padding: var(--sp-5) var(--sp-4) var(--sp-6); }
  .state-chip { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 12px; border-radius: var(--md-shape-full); background: var(--md-surface-container); color: var(--md-on-surface-variant); font-size: 12px; font-weight: 700; letter-spacing: -.12px; margin-bottom: var(--sp-5); }
  .state-chip .ms { font-size: 15px; }

  /* QR deshabilitado */
  .qrcard { border: var(--apple-hairline); border-radius: var(--md-shape-lg); background: var(--md-surface-container-low); padding: var(--sp-6) var(--sp-4); display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
  .qr-ph { width: 200px; height: 200px; border-radius: var(--md-shape-md); background: var(--md-surface-container-highest); display: grid; place-items: center; color: var(--md-outline); }
  .qr-ph .ms { font-size: 56px; }
  .code-label { margin-top: var(--sp-5); font-size: 11px; font-weight: 700; letter-spacing: .4px; color: var(--md-on-surface-variant); }
  .code { margin-top: 6px; font-size: 40px; font-weight: 700; letter-spacing: 8px; color: var(--md-outline); }

  /* Aviso */
  .notice { display: flex; align-items: flex-start; gap: 10px; margin-top: var(--sp-5); padding: var(--sp-4); border-radius: var(--md-shape-md); background: var(--md-surface-container); }
  .notice .ms { font-size: 20px; color: var(--md-on-surface-variant); flex: none; }
  .notice p { margin: 0; font-size: 13px; line-height: 19px; color: var(--md-on-surface); letter-spacing: -.12px; }
  .notice p b { font-weight: 700; }

  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); background: var(--md-surface); border-top: var(--apple-hairline); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <a class="appbar__icon" href="../issues-11-14-registrar-cancha/gestion-cancha.html" aria-label="Volver"><span class="ms">arrow_back</span></a>
      <div class="appbar__title">
        <b>Código de reseñas</b>
        <span>Cancha La Sabana</span>
      </div>
    </header>

    <div class="scroll">
      <span class="state-chip"><span class="ms">edit_note</span> Borrador</span>

      <div class="qrcard">
        <div class="qr-ph"><span class="ms">qr_code_2</span></div>
        <div class="code-label">CÓDIGO INACTIVO</div>
        <div class="code">— — —</div>
      </div>

      <div class="notice">
        <span class="ms">info</span>
        <p>El código no habilita reseñas porque esta cancha todavía está en <b>borrador</b>. Publicala para activar la validación de presencia.</p>
      </div>
    </div>

    <div class="actionbar">
      <a class="md-btn md-btn--filled md-btn--full" href="../issues-11-14-registrar-cancha/onboarding.html">Ir a publicar la cancha</a>
    </div>
  </div>
</div>
</body>
</html>
