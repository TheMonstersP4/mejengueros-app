<!--

  #36/#37. Rol mejenguero => Bottom Navigation (Perfil activa).
  Componentes MD3 (selección); estética apple-DESIGN.md. Tokens en ../_shared/md3-tokens.css

<html lang="es">
<head>

<title>Perfil</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .appbar { display: flex; align-items: center; gap: var(--sp-2); padding: var(--sp-3) var(--sp-4) var(--sp-2); background: var(--md-surface); }
  .appbar h1 { margin: 0; flex: 1; color: var(--md-on-surface); }

  .scroll { flex: 1; overflow-y: auto; padding: var(--sp-3) var(--sp-4) 96px; }

  /* Cabecera de identidad */
  .ident { display: flex; flex-direction: column; align-items: center; text-align: center; padding: var(--sp-4) 0 var(--sp-6); }
  .avatar { width: 96px; height: 96px; border-radius: 50%; overflow: hidden; background: var(--md-surface-container-highest); display: grid; place-items: center; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .ident h2 { margin: var(--sp-4) 0 4px; color: var(--md-on-surface); }
  .ident__pos { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--md-on-surface-variant); letter-spacing: -.2px; }
  .ident__pos .ms { font-size: 17px; }
  .ident .md-btn { margin-top: var(--sp-5); }

  .section-label { font-size: 11px; font-weight: 700; letter-spacing: .4px; color: var(--md-on-surface-variant); margin: 0 0 var(--sp-2); }
  .group { background: var(--md-surface); border: var(--apple-hairline); border-radius: var(--md-shape-md); overflow: hidden; }
  .row { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4); text-decoration: none; cursor: pointer; }
  .row + .row { border-top: var(--apple-hairline); }
  .row:active { background: var(--md-surface-container-low); }
  .row__icon { width: 40px; height: 40px; flex: none; border-radius: 50%; display: grid; place-items: center; font-size: 20px; background: var(--md-surface-container); color: var(--md-on-surface); }
  .row__body { flex: 1; min-width: 0; }
  .row__body b { display: block; font-size: 15px; font-weight: 700; letter-spacing: -.2px; color: var(--md-on-surface); }
  .row__body span { font-size: 12px; color: var(--md-on-surface-variant); letter-spacing: -.12px; }
  .row__chevron { flex: none; color: var(--md-on-surface-variant); }
  .row__chevron .ms { font-size: 22px; }

  .logout { display: block; text-align: center; margin-top: var(--sp-6); color: var(--md-on-surface-variant); font-size: 14px; font-weight: 600; letter-spacing: -.2px; text-decoration: none; }

  .bottomnav { position: absolute; left: 0; right: 0; bottom: 0; z-index: 10; display: flex; height: 64px; background: var(--md-surface); border-top: var(--apple-hairline); }
  .navitem { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: var(--md-on-surface-variant); }
  .navitem .ms { font-size: 24px; }
  .navitem span { font-size: 11px; font-weight: 600; letter-spacing: -.1px; }
  .navitem--active { color: var(--md-primary); }
</style>
</head>

    <nav class="bottomnav" aria-label="Navegación principal">

</div>
