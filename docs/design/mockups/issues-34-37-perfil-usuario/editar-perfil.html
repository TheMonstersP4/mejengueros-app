<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Editar perfil
  Issues: #36 (apodo + posición favorita) y #37 (foto de perfil). Muestra los
  valores actuales; apodo con validación de formato/longitud; posición favorita
  de un set predefinido; la foto se cambia vía sheet (#37, subida por infra #28).
  Sub-vista del perfil => back. Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar perfil</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; background: none; border: none; cursor: pointer; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__title { flex: 1; padding-left: 4px; }
  .appbar__title .md-title-large { color: var(--md-on-surface); }

  .scroll { flex: 1; overflow-y: auto; padding: var(--sp-5) var(--sp-4) 120px; }

  /* Foto (#37) */
  .photo { display: flex; flex-direction: column; align-items: center; margin-bottom: var(--sp-6); }
  .photo__avatar { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; background: var(--md-surface-container-highest); display: grid; place-items: center; }
  .photo__avatar img { width: 100%; height: 100%; object-fit: cover; }
  .photo__change { margin-top: var(--sp-3); display: inline-flex; align-items: center; gap: 7px; height: 40px; padding: 0 16px; border-radius: var(--md-shape-full); border: 1px solid var(--md-primary); background: transparent; color: var(--md-primary); font-size: 14px; font-weight: 600; letter-spacing: -.2px; text-decoration: none; cursor: pointer; }
  .photo__change .ms { font-size: 18px; }

  .field-label { font-size: 12px; font-weight: 700; letter-spacing: -.12px; color: var(--md-on-surface); margin-bottom: var(--sp-2); }
  .stack { display: flex; flex-direction: column; gap: var(--sp-5); }

  .q__title { font-size: 12px; font-weight: 700; letter-spacing: -.12px; color: var(--md-on-surface); margin-bottom: var(--sp-3); }
  .opts { display: flex; flex-wrap: wrap; gap: var(--sp-2); }
  .opt { display: inline-flex; align-items: center; gap: 6px; height: 40px; padding: 0 16px; border: 1px solid var(--md-outline-variant); border-radius: var(--md-shape-full); background: var(--md-surface); color: var(--md-on-surface); font-size: 14px; font-weight: 600; letter-spacing: -.2px; cursor: pointer; }
  .opt .ms { font-size: 17px; color: var(--md-on-surface-variant); }
  .opt--sel { background: var(--md-primary); border-color: var(--md-primary); color: var(--md-on-primary); }
  .opt--sel .ms { color: var(--md-on-primary); }

  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); background: var(--md-surface); border-top: var(--apple-hairline); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <a class="appbar__icon" href="perfil.html" aria-label="Volver"><span class="ms">arrow_back</span></a>
      <div class="appbar__title"><div class="md-title-large">Editar perfil</div></div>
    </header>

    <div class="scroll">
      <!-- Foto de perfil (#37) -->
      <div class="photo">
        <div class="photo__avatar"><img src="https://picsum.photos/seed/dani-avatar/200/200" alt="Foto de perfil"></div>
        <a class="photo__change" href="cambiar-foto.html"><span class="ms">photo_camera</span> Cambiar foto</a>
      </div>

      <div class="stack">
        <!-- Apodo (#36) -->
        <div class="md-field">
          <input id="apodo" type="text" value="Dani10" placeholder=" ">
          <label for="apodo">Apodo</label>
          <span class="md-field__support">Mínimo 3 caracteres. Sin espacios.</span>
        </div>

        <!-- Posición favorita (#36) -->
        <div>
          <div class="q__title">POSICIÓN FAVORITA</div>
          <div class="opts">
            <span class="opt"><span class="ms">sports_handball</span> Arquero</span>
            <span class="opt">Defensa</span>
            <span class="opt opt--sel">Mediocampista</span>
            <span class="opt">Delantero</span>
          </div>
        </div>
      </div>
    </div>

    <div class="actionbar">
      <button class="md-btn md-btn--filled md-btn--full">Guardar cambios</button>
    </div>
  </div>
</div>
</body>
</html>
