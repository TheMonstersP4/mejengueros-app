<!DOCTYPE html>
<!--
  FLUJO: Dueño de cancha — Onboarding · SERVICIOS (sub-página dedicada)
  Issue: #14 Servicios. Se llega desde onboarding.html (hub); back vuelve al hub.
  Componentes: MD3 (selección). Estética: apple-DESIGN.md. Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios · Registrar cancha</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; background: none; border: none; cursor: pointer; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__icon:active { transform: scale(.92); }
  .appbar__title { flex: 1; color: var(--md-on-surface); padding-left: 4px; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .scroll { flex: 1; overflow-y: auto; padding: var(--sp-4) var(--sp-4) 120px; }
  .lead { margin: 0 0 var(--sp-5); color: var(--md-on-surface-variant); }
  .stack { display: flex; flex-direction: column; gap: var(--sp-3); }

  .service { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4); border-radius: var(--md-shape-md); background: var(--md-surface-container-low); }
  .service__icon { width: 40px; height: 40px; flex: none; border-radius: 50%; display: grid; place-items: center; font-size: 20px; background: var(--md-surface-container-highest); color: var(--md-on-surface-variant); }
  .service__txt { flex: 1; }
  .service__txt b { display: block; font-size: 15px; color: var(--md-on-surface); }
  .service__txt span { font-size: 12px; color: var(--md-on-surface-variant); }

  .md-field select { appearance: none; -webkit-appearance: none; background-image: none; }
  .md-field__caret { position: absolute; right: 14px; top: 22px; pointer-events: none; color: var(--md-on-surface-variant); font-size: 24px; }

  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); background: var(--md-surface); border-top: var(--apple-hairline); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <a class="appbar__icon" href="onboarding.html" role="button" aria-label="Volver"><span class="ms">arrow_back</span></a>
      <div class="appbar__title"><div class="md-title-large">Servicios</div></div>
    </header>

    <div class="scroll">
      <p class="lead md-body-medium">Parqueo e iluminación son sí/no. El tipo de césped sale de un catálogo cerrado.</p>

      <div class="stack">
        <div class="service">
          <span class="service__icon ms">local_parking</span>
          <div class="service__txt"><b>Parqueo</b><span>¿La cancha cuenta con parqueo?</span></div>
          <label class="md-switch"><input type="checkbox" checked><span class="track"></span><span class="thumb"></span></label>
        </div>
        <div class="service">
          <span class="service__icon ms">lightbulb</span>
          <div class="service__txt"><b>Iluminación</b><span>¿Apta para jugar de noche?</span></div>
          <label class="md-switch"><input type="checkbox" checked><span class="track"></span><span class="thumb"></span></label>
        </div>
        <div class="md-field">
          <select id="cesped">
            <option>Sintético</option>
            <option>Natural</option>
            <option>Híbrido</option>
          </select>
          <label for="cesped">Tipo de césped</label>
          <span class="md-field__caret ms">arrow_drop_down</span>
          <span class="md-field__support">Catálogo definido por el sistema.</span>
        </div>
      </div>
    </div>

    <div class="actionbar">
      <button class="md-btn md-btn--filled md-btn--full">Guardar servicios</button>
    </div>
  </div>
</div>
</body>
</html>
