<!DOCTYPE html>
<!--
  FLUJO: Administrador — Usuarios · ESTADO VACÍO DE FILTRO (#42)
  Caso alterno: la combinación de filtros (rol/estado) no arroja coincidencias.
  Se comunica claro y se ofrece limpiar filtros. Solo admin. Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios · Sin resultados</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; background: none; border: none; cursor: pointer; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__title { flex: 1; padding-left: 4px; color: var(--md-on-surface); }

  .filters { display: flex; gap: var(--sp-2); padding: 0 var(--sp-4) var(--sp-3); background: var(--md-surface); }
  .filter { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 12px 0 14px; border: 1px solid var(--md-outline-variant); border-radius: var(--md-shape-full); background: var(--md-surface); color: var(--md-on-surface); font-size: 14px; font-weight: 600; letter-spacing: -.2px; cursor: pointer; }
  .filter .ms { font-size: 18px; color: var(--md-on-surface-variant); }
  .filter--set { background: var(--md-primary-container); border-color: var(--md-primary-container); color: var(--md-on-primary-container); }
  .filter--set .ms { color: var(--md-on-primary-container); }

  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--sp-6) var(--sp-8); background: var(--md-surface-container); }
  .empty__icon { width: 88px; height: 88px; border-radius: 50%; display: grid; place-items: center; background: var(--md-surface); border: var(--apple-hairline); margin-bottom: var(--sp-5); }
  .empty__icon .ms { font-size: 40px; color: var(--md-on-surface-variant); }
  .empty h2 { margin: 0 0 8px; color: var(--md-on-surface); }
  .empty p { margin: 0 0 var(--sp-5); max-width: 260px; color: var(--md-on-surface-variant); font-size: 14px; line-height: 20px; letter-spacing: -.2px; }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <input type="checkbox" id="drawerToggle" aria-hidden="true">

  <div class="content">
    <header class="appbar">
      <label class="appbar__icon" for="drawerToggle" role="button" aria-label="Abrir menú"><span class="ms">menu</span></label>
      <div class="appbar__title"><div class="md-title-large">Usuarios</div></div>
    </header>

    <div class="filters">
      <button class="filter filter--set">Rol: Administrador <span class="ms">expand_more</span></button>
      <button class="filter filter--set">Estado: Inactivo <span class="ms">expand_more</span></button>
    </div>

    <div class="empty">
      <div class="empty__icon"><span class="ms">filter_alt_off</span></div>
      <h2 class="md-title-large">Sin usuarios para esos filtros</h2>
      <p>No hay administradores inactivos. Probá cambiar el rol o el estado.</p>
      <button class="md-btn md-btn--outlined">Limpiar filtros</button>
    </div>
  </div>

  <label class="scrim" for="drawerToggle" aria-label="Cerrar menú"></label>
  <nav class="drawer" aria-label="Navegación de administrador">
    <div class="drawer__head">
      <span class="drawer__avatar ms ms--fill">shield_person</span>
      <div class="drawer__who">
        <b>Panel admin</b>
        <span>Administrador</span>
      </div>
      <label class="drawer__close" for="drawerToggle" role="button" aria-label="Cerrar menú"><span class="ms">close</span></label>
    </div>
    <a class="drawer-item" href="#"><span class="ms">dashboard</span> Inicio</a>
    <a class="drawer-item drawer-item--active" href="#"><span class="ms ms--fill">group</span> Usuarios</a>
    <a class="drawer-item" href="../issues-43-44-admin-canchas/canchas-admin.html"><span class="ms">sports_soccer</span> Canchas</a>
  </nav>
</div>
</body>
</html>
