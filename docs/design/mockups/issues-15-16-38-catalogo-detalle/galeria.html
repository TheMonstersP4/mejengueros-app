<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Galería ampliada de fotos de la cancha
  Issue: #16 (vista separada de exploración). Se abre desde el detalle.
  Layout tipo masonry/grid priorizando exploración visual. Back vuelve al detalle.
  Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotos · Cancha La Sabana</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); border-bottom: var(--apple-hairline); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; background: none; border: none; cursor: pointer; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__icon:active { transform: scale(.92); }
  .appbar__title { flex: 1; padding-left: 4px; }
  .appbar__title b { display: block; font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: var(--md-on-surface); }
  .appbar__title span { font-size: 12px; color: var(--md-on-surface-variant); letter-spacing: -.12px; }

  /* Masonry vía CSS columns */
  .scroll { flex: 1; overflow-y: auto; padding: var(--sp-3) var(--sp-3) var(--sp-5); background: var(--md-surface-container); }
  .masonry { column-count: 2; column-gap: var(--sp-2); }
  .masonry img { width: 100%; margin-bottom: var(--sp-2); border-radius: var(--md-shape-md); display: block; break-inside: avoid; background: var(--md-surface-container-highest); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <a class="appbar__icon" href="detalle.html" aria-label="Volver"><span class="ms">arrow_back</span></a>
      <div class="appbar__title">
        <b>Fotos</b>
        <span>Cancha La Sabana · 6 fotos</span>
      </div>
    </header>

    <div class="scroll">
      <div class="masonry">
        <img src="https://picsum.photos/seed/sabana-1/500/680" alt="Cancha, vista 1">
        <img src="https://picsum.photos/seed/sabana-4/500/420" alt="Cancha, vista 4">
        <img src="https://picsum.photos/seed/sabana-2/500/520" alt="Cancha, vista 2">
        <img src="https://picsum.photos/seed/sabana-5/500/640" alt="Cancha, vista 5">
        <img src="https://picsum.photos/seed/sabana-3/500/460" alt="Cancha, vista 3">
        <img src="https://picsum.photos/seed/sabana-6/500/600" alt="Cancha, vista 6">
      </div>
    </div>
  </div>
</div>
</body>
</html>
