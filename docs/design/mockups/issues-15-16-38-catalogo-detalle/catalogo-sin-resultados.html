<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Catálogo · ESTADO VACÍO (#15)
  Caso alterno del spec: búsqueda/filtros sin coincidencias entre canchas
  publicadas + activas. Debe comunicarse claro, sin fallar y manteniendo
  los controles de descubrimiento para ajustar. Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canchas · Sin resultados</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .appbar { display: flex; align-items: center; gap: var(--sp-2); padding: var(--sp-3) var(--sp-4) var(--sp-2); background: var(--md-surface); }
  .appbar h1 { margin: 0; color: var(--md-on-surface); }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .discover { padding: 0 var(--sp-4) var(--sp-3); background: var(--md-surface); }
  .search { display: flex; align-items: center; gap: 10px; height: 44px; padding: 0 16px; border: 1px solid var(--md-outline-variant); border-radius: var(--md-shape-full); background: var(--md-surface); color: var(--md-on-surface-variant); }
  .search .ms { font-size: 20px; }
  .search input { flex: 1; border: none; outline: none; background: none; font-family: var(--md-font); font-size: 16px; letter-spacing: -.3px; color: var(--md-on-surface); }
  .filters { display: flex; gap: var(--sp-2); margin-top: var(--sp-3); }
  .filter { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 12px 0 14px; border: 1px solid var(--md-outline-variant); border-radius: var(--md-shape-full); background: var(--md-surface); color: var(--md-on-surface); font-size: 14px; font-weight: 600; letter-spacing: -.2px; cursor: pointer; }
  .filter .ms { font-size: 18px; color: var(--md-on-surface-variant); }
  .filter--set { background: var(--md-primary-container); border-color: var(--md-primary-container); color: var(--md-on-primary-container); }
  .filter--set .ms { color: var(--md-on-primary-container); }

  /* Empty state */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--sp-6) var(--sp-8) 96px; background: var(--md-surface-container); }
  .empty__icon { width: 88px; height: 88px; border-radius: 50%; display: grid; place-items: center; background: var(--md-surface); border: var(--apple-hairline); margin-bottom: var(--sp-5); }
  .empty__icon .ms { font-size: 40px; color: var(--md-on-surface-variant); }
  .empty h2 { margin: 0 0 8px; color: var(--md-on-surface); }
  .empty p { margin: 0 0 var(--sp-5); max-width: 260px; color: var(--md-on-surface-variant); font-size: 14px; line-height: 20px; letter-spacing: -.2px; }

  .bottomnav { position: absolute; left: 0; right: 0; bottom: 0; z-index: 10; display: flex; height: 64px; background: var(--md-surface); border-top: var(--apple-hairline); }
  .navitem { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; text-decoration: none; color: var(--md-on-surface-variant); }
  .navitem .ms { font-size: 24px; }
  .navitem span { font-size: 11px; font-weight: 600; letter-spacing: -.1px; }
  .navitem--active { color: var(--md-primary); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <h1 class="md-headline-small">Canchas</h1>
    </header>

    <div class="discover">
      <label class="search">
        <span class="ms">search</span>
        <input type="text" value="cancha techada" placeholder="Buscar cancha por nombre">
      </label>
      <div class="filters">
        <button class="filter filter--set">Provincia: Cartago <span class="ms">expand_more</span></button>
        <button class="filter filter--set">Cantón: Turrialba <span class="ms">expand_more</span></button>
      </div>
    </div>

    <div class="empty">
      <div class="empty__icon"><span class="ms">search_off</span></div>
      <h2 class="md-title-large">Sin canchas para esa búsqueda</h2>
      <p>No hay canchas publicadas que coincidan con “cancha techada” en Turrialba. Probá quitar un filtro o buscar en otra zona.</p>
      <button class="md-btn md-btn--outlined">Limpiar filtros</button>
    </div>

    <nav class="bottomnav" aria-label="Navegación principal">
      <a class="navitem" href="#"><span class="ms">home</span><span>Inicio</span></a>
      <a class="navitem navitem--active" href="#"><span class="ms ms--fill">search</span><span>Buscar</span></a>
      <a class="navitem" href="#"><span class="ms">favorite</span><span>Favoritas</span></a>
      <a class="navitem" href="#"><span class="ms">person</span><span>Perfil</span></a>
    </nav>
  </div>
</div>
</body>
</html>
