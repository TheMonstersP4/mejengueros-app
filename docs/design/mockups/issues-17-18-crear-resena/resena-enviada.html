<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Reseña enviada (#17)
  Confirmación simple tras enviar la reseña de una reserva finalizada.
  Tokens en ../_shared/mejengueros-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reseña enviada</title>
<link rel="stylesheet" href="../_shared/mejengueros-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }
  .state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--sp-6) var(--sp-8) 120px; }
  .state__icon { width: 96px; height: 96px; border-radius: 50%; display: grid; place-items: center; background: var(--md-primary-container); margin-bottom: var(--sp-6); }
  .state__icon .ms { font-size: 52px; color: var(--md-primary); }
  .state h1 { margin: 0 0 10px; color: var(--md-on-surface); }
  .state p { margin: 0; max-width: 280px; color: var(--md-on-surface-variant); font-size: 15px; line-height: 22px; letter-spacing: -.2px; }
  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-2); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <div class="state">
      <div class="state__icon gol-pop ms ms--fill" style="color:#161E00">check_circle</div>
      <h1 class="md-headline-small">¡Gracias por tu reseña!</h1>
      <p>Tu calificación ya es visible para otros mejengueros y para el dueño de la cancha.</p>
    </div>

    <div class="actionbar">
      <a class="md-btn md-btn--filled md-btn--full" href="../issue-50-reservar/mis-reservas.html">Volver a mis reservas</a>
      <a class="md-btn md-btn--text md-btn--full" href="../issues-15-16-catalogo-detalle/catalogo.html">Explorar canchas</a>
    </div>
  </div>
</div>
</body>
</html>
