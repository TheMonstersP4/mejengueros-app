<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Crear reseña · PASO 1 CALIFICACIÓN
  Issue: #18 (rating 1–5 estrellas, entero, obligatorio, editable). Wizard
  secuencial de 3 pasos. Si el usuario elige 1★ se activa la rama de #19
  (ver paso-1-una-estrella.html). Tokens en ../_shared/md3-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calificación · Nueva reseña</title>
<link rel="stylesheet" href="../_shared/md3-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; background: none; border: none; cursor: pointer; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__title { flex: 1; padding-left: 4px; }
  .appbar__title b { display: block; font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: var(--md-on-surface); }
  .appbar__title span { font-size: 12px; color: var(--md-on-surface-variant); letter-spacing: -.12px; }

  /* Stepper (wizard secuencial) */
  .stepper { display: flex; gap: var(--sp-2); padding: var(--sp-2) var(--sp-4) var(--sp-4); }
  .step { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .step__bar { height: 4px; border-radius: var(--md-shape-full); background: var(--md-surface-container-highest); }
  .step--done .step__bar, .step--current .step__bar { background: var(--md-primary); }
  .step__label { font-size: 11px; font-weight: 600; letter-spacing: -.1px; color: var(--md-on-surface-variant); }
  .step--done .step__label, .step--current .step__label { color: var(--md-on-surface); }

  .scroll { flex: 1; overflow-y: auto; padding: var(--sp-4) var(--sp-4) 120px; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .prompt { margin: var(--sp-6) 0 var(--sp-2); color: var(--md-on-surface); }
  .sub { margin: 0 0 var(--sp-8); color: var(--md-on-surface-variant); font-size: 14px; letter-spacing: -.2px; }

  .stars { display: flex; gap: var(--sp-3); margin-bottom: var(--sp-5); }
  .stars .ms { font-size: 46px; }
  .stars .on { color: #f5a623; }
  .stars .off { color: var(--md-outline-variant); }

  .verdict { font-size: 20px; font-weight: 700; letter-spacing: -.4px; color: var(--md-on-surface); }
  .verdict span { display: block; margin-top: 4px; font-size: 13px; font-weight: 600; color: var(--md-on-surface-variant); }

  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); background: var(--md-surface); border-top: var(--apple-hairline); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <a class="appbar__icon" href="validacion.html" aria-label="Volver"><span class="ms">arrow_back</span></a>
      <div class="appbar__title">
        <b>Nueva reseña</b>
        <span>Cancha La Sabana</span>
      </div>
    </header>

    <div class="stepper">
      <div class="step step--current"><div class="step__bar"></div><div class="step__label">Calificación</div></div>
      <div class="step"><div class="step__bar"></div><div class="step__label">Cuestionario</div></div>
      <div class="step"><div class="step__bar"></div><div class="step__label">Comentario</div></div>
    </div>

    <div class="scroll">
      <h1 class="prompt md-headline-small">¿Cómo estuvo tu mejenga?</h1>
      <p class="sub">Tocá las estrellas para calificar la experiencia.</p>

      <div class="stars" role="radiogroup" aria-label="Calificación de 1 a 5 estrellas">
        <span class="ms ms--fill on">star</span>
        <span class="ms ms--fill on">star</span>
        <span class="ms ms--fill on">star</span>
        <span class="ms ms--fill on">star</span>
        <span class="ms off">star</span>
      </div>

      <div class="verdict">Muy buena<span>4 de 5 estrellas</span></div>
    </div>

    <div class="actionbar">
      <button class="md-btn md-btn--filled md-btn--full">Continuar</button>
    </div>
  </div>
</div>
</body>
</html>
