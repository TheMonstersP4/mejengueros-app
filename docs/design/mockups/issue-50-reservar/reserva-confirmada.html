<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Reserva confirmada (#50)
  El sistema crea la reserva (1 slot de 1h, asociada al usuario y cancha) y la
  confirma. El slot queda bloqueado para otros. Tokens en ../_shared/goalstryke-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva confirmada</title>
<link rel="stylesheet" href="../_shared/goalstryke-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }

  .state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--sp-6) var(--sp-6) 120px; }
  .state__icon { width: 96px; height: 96px; border-radius: 50%; display: grid; place-items: center; background: var(--md-primary-container); margin-bottom: var(--sp-5); }
  .state__icon .ms { font-size: 52px; color: var(--md-primary); }
  .state h1 { margin: 0 0 10px; color: var(--md-on-surface); }
  .state > p { margin: 0 0 var(--sp-6); max-width: 280px; color: var(--md-on-surface-variant); font-size: 15px; line-height: 22px; letter-spacing: -.2px; }

  .ticket { width: 100%; background: var(--md-surface); border: var(--apple-hairline); border-radius: var(--md-shape-md); padding: var(--sp-4); text-align: left; }
  .ticket__row { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-2) 0; }
  .ticket__row + .ticket__row { border-top: var(--apple-hairline); }
  .ticket__row .ms { font-size: 20px; color: var(--md-on-surface-variant); flex: none; }
  .ticket__row b { font-size: 14px; font-weight: 700; color: var(--md-on-surface); letter-spacing: -.2px; }
  .ticket__row span { display: block; font-size: 12px; color: var(--md-on-surface-variant); }

  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); display: flex; flex-direction: column; gap: var(--sp-2); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <div class="state">
      <div class="state__icon gol-pop ms ms--fill" style="background:radial-gradient(circle at 50% 28%, #D4FF33 0%, #5a7300 96%);color:#161E00">sports_soccer</div>
      <h1 class="md-headline-small">¡GOOOL! Reserva confirmada</h1>
      <p>Tu cancha quedó reservada por 1 hora. Te avisaremos para que dejes tu reseña cuando termine.</p>

      <div class="ticket">
        <div class="ticket__row"><span class="ms">sports_soccer</span><div><b>Mejengas CR · Cancha 1</b><span>San José · Escazú</span></div></div>
        <div class="ticket__row"><span class="ms">event</span><div><b>Hoy, 16 de junio</b><span>19:00 – 20:00</span></div></div>
      </div>
    </div>

    <div class="actionbar">
      <a class="md-btn md-btn--filled md-btn--full" href="mis-reservas.html">Ver mis reservas</a>
      <a class="md-btn md-btn--text md-btn--full" href="../issues-15-16-catalogo-detalle/catalogo.html">Volver al catálogo</a>
    </div>
  </div>
</div>
</body>
</html>
