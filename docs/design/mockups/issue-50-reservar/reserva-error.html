<!DOCTYPE html>
<!--
  FLUJO: Mejenguero — Reserva: error de no disponibilidad (#50 / #55)
  Caso central de error: dos usuarios intentan el mismo slot; el primero que
  confirma gana y el segundo recibe un error de negocio claro. Validación en
  servidor. Tokens en ../_shared/mejengueros-tokens.css
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario no disponible</title>
<link rel="stylesheet" href="../_shared/mejengueros-tokens.css">
<style>
  .content { display: flex; flex-direction: column; height: 100%; min-width: 0; }
  .statusbar-icons { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar-icons .ms { font-size: 17px; }
  .appbar { display: flex; align-items: center; gap: var(--sp-1); padding: var(--sp-2) var(--sp-3); background: var(--md-surface); }
  .appbar__icon { width: 44px; height: 44px; flex: none; display: grid; place-items: center; color: var(--md-on-surface); border-radius: 50%; text-decoration: none; }
  .appbar__icon .ms { font-size: 24px; }
  .appbar__title { flex: 1; padding-left: 4px; color: var(--md-on-surface); }

  .state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--sp-6) var(--sp-8) 120px; }
  .state__icon { width: 88px; height: 88px; border-radius: 50%; display: grid; place-items: center; background: var(--md-error-container); margin-bottom: var(--sp-5); }
  .state__icon .ms { font-size: 42px; color: var(--md-error); }
  .state h1 { margin: 0 0 10px; color: var(--md-on-surface); }
  .state p { margin: 0; max-width: 280px; color: var(--md-on-surface-variant); font-size: 14px; line-height: 21px; letter-spacing: -.2px; }
  .state p b { color: var(--md-on-surface); font-weight: 700; }

  .actionbar { position: absolute; left: 0; right: 0; bottom: 0; padding: var(--sp-3) var(--sp-4) var(--sp-5); }
</style>
</head>
<body>
<div class="phone">
  <div class="phone__status">
    <span>9:41</span>
    <span class="statusbar-icons"><span class="ms">network_cell</span><span class="ms">wifi</span><span class="ms">battery_full</span></span>
  </div>

  <div class="content">
    <header class="appbar">
      <a class="appbar__icon" href="reservar.html" aria-label="Volver"><span class="ms">arrow_back</span></a>
      <div class="appbar__title"><div class="md-title-large">Reservar</div></div>
    </header>

    <div class="state">
      <div class="state__icon"><span class="ms">event_busy</span></div>
      <h1 class="md-title-large">Ese horario ya se reservó</h1>
      <p>El slot de las <b>19:00</b> lo tomó otra persona hace un momento. Elegí otro horario disponible para esta cancha.</p>
    </div>

    <div class="actionbar">
      <a class="md-btn md-btn--filled md-btn--full" href="reservar.html">Ver otros horarios</a>
    </div>
  </div>
</div>
</body>
</html>
