version: '3'

vars:
  GRADLEW: '{{if eq OS "windows"}}gradlew.bat{{else}}./gradlew{{end}}'
  GRADLE_ARGS: --no-configuration-cache --console=plain

tasks:
  spotless:apply:
    desc: Format Kotlin and Gradle Kotlin files
    cmds:
      - '{{.GRADLEW}} spotlessApply {{.GRADLE_ARGS}}'

  format:
    desc: Format Kotlin and Gradle Kotlin files
    cmds:
      - task: spotless:apply

  spotless:check:
    desc: Run Spotless checks for Kotlin and Gradle Kotlin files
    cmds:
      - '{{.GRADLEW}} spotlessCheck {{.GRADLE_ARGS}}'

  check:
    desc: Run Spotless checks for Kotlin and Gradle Kotlin files
    cmds:
      - task: spotless:check

  test:
    desc: Run the shared JVM test suite
    cmds:
      - '{{.GRADLEW}} :shared:jvmTest {{.GRADLE_ARGS}}'

  test:auth:
    desc: Run the focused AuthViewModel shared JVM test suite
    cmds:
      - '{{.GRADLEW}} :shared:jvmTest --tests "io.github.themonstersp4.mejengueros.presentation.auth.AuthViewModelTest" {{.GRADLE_ARGS}}'

  android:debug:
    desc: Build the Android debug APK
    cmds:
      - '{{.GRADLEW}} :androidApp:assembleDebug {{.GRADLE_ARGS}}'

  android:host-test:
    desc: Run the shared Android host test suite
    cmds:
      - '{{.GRADLEW}} :shared:testAndroidHostTest {{.GRADLE_ARGS}}'

  android:host-test:auth:
    desc: Run focused auth screen Android host tests
    cmds:
      - '{{.GRADLEW}} :shared:testAndroidHostTest --tests "io.github.themonstersp4.mejengueros.screens.auth.*" {{.GRADLE_ARGS}}'

  desktop:compile:
    desc: Compile the Desktop JVM app
    cmds:
      - '{{.GRADLEW}} :desktopApp:compileKotlin {{.GRADLE_ARGS}}'

  verify:
    desc: Run the same core checks as CI
    cmds:
      - '{{.GRADLEW}} spotlessCheck :shared:jvmTest :shared:testAndroidHostTest :androidApp:assembleDebug :desktopApp:compileKotlin {{.GRADLE_ARGS}}'
